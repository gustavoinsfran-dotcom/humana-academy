<script>
const MARK=`<svg style="width:100%;height:100%;display:block" viewBox="0 0 128 74" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hg2" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#4733A6"/><stop offset="0.45" stop-color="#8E2E9E"/><stop offset="1" stop-color="#EC2E8E"/></linearGradient></defs><path fill="url(#hg2)" d="M6 66 L40 18 L40 9 L48 9 L48 15 L50 12 Q53 8 56 13 L62 24 Q84 52 124 44 Q98 41 68 31 Q60 28 55 34 L34 66 Z"/></svg>`;
const LI='<svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg>';
const STORE={get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
let scores=STORE.get('hn_s',{}), uname=STORE.get('ha_name',''), uemail=STORE.get('ha_email','');
const IDS=[1,2,3,4,5];
const done=n=>scores[n]!=null&&scores[n]>=60, allDone=()=>IDS.every(done);

const LES=[
{n:1,t:"Qué es Humana Nexo",lead:"Empecemos por lo esencial: qué es un programa de pacientes y qué hace Nexo.",
 body:`<h2>La idea</h2><p>Antes que nada, una definición simple. Un <strong>programa de pacientes</strong> (también llamado programa de acompañamiento o de asistencia al paciente) existe para que un tratamiento <strong>se complete bien, de principio a fin</strong>. No es la parte médica —eso lo deciden los médicos—: es todo lo que rodea al tratamiento para que no se caiga en el camino.</p>
 <h2>Qué es Humana Nexo</h2><p>Humana Nexo es la <strong>Unidad de Continuidad Terapéutica</strong> de Humana. Acompaña <em>terapias especiales</em> —tratamientos que se dan por dosis o ciclos a lo largo del tiempo— para que sean <strong>acompañadas, seguras y trazables</strong>. Su idea, en una frase: <em>«el hilo que conecta cada dosis con la siguiente»</em>.</p>
 <div class="quote">No acompañamos una infusión. Garantizamos una terapia.</div>
 <h2>Qué significa esa frase</h2><p>«Garantizar una terapia» no promete un resultado clínico (eso depende del médico y del paciente). Significa cuidar la <strong>continuidad del acompañamiento</strong>: que el tratamiento se complete de forma segura y trazable, sin que se pierda ninguna dosis por el camino.</p>
 <h2>Para llevarte</h2><p>Nexo cuida el hilo entre una dosis y la siguiente. Y vos, desde administración y recepción, sos una parte importante de ese hilo.</p>`,
 quiz:[{q:"¿Para qué existe un programa de pacientes?",o:["Para reemplazar al médico","Para que el tratamiento se complete bien de principio a fin","Para vender medicación","Para hacer diagnósticos"],c:1,e:"Acompaña todo lo que rodea al tratamiento para que no se caiga."},{q:"¿Qué es Humana Nexo?",o:["Una farmacia","La Unidad de Continuidad Terapéutica de Humana","Una obra social","Un laboratorio"],c:1,e:"Es la unidad que acompaña terapias especiales para que sean seguras y trazables."},{q:"«El hilo que conecta cada dosis con la siguiente» quiere decir que Nexo cuida…",o:["El precio de la terapia","La continuidad entre una aplicación y la próxima","Solo la primera dosis","La publicidad"],c:1,e:"El foco está en que no se pierda la continuidad entre dosis."},{q:"«Garantizar una terapia» significa…",o:["Prometer la cura","Cuidar la continuidad del acompañamiento, segura y trazable","Dar el alta","Elegir el tratamiento"],c:1,e:"No promete un resultado clínico: cuida que el tratamiento se complete bien."},{q:"El rol de administración/recepción en Nexo es…",o:["Irrelevante","Parte del hilo que sostiene la continuidad","Solo atender el teléfono","Exclusivamente médico"],c:1,e:"Recepción y administración son parte de lo que sostiene el hilo."}]},

{n:2,t:"El problema que resolvemos",lead:"Entre una dosis y la siguiente pasan muchas cosas que nadie observa.",
 body:`<h2>La idea</h2><p>El momento más frágil de una terapia no es la aplicación en sí: es <strong>lo que pasa entre una dosis y la siguiente</strong>. Ahí, cuando el paciente está en su casa y nadie mira, es donde un tratamiento se puede caer.</p>
 <div class="quote">Entre una dosis y la siguiente pasan muchas cosas que nadie observa.</div>
 <h2>Los cinco riesgos</h2><p>Nexo se ocupa de cinco puntos donde el hilo se puede cortar:</p>
 <ul><li><strong>Retrasos:</strong> la próxima dosis se corre sin que nadie reaccione a tiempo.</li>
 <li><strong>Logística:</strong> la medicación, los insumos o la enfermería no llegan cuando tienen que llegar.</li>
 <li><strong>Sin seguimiento:</strong> entre visitas, el paciente queda sin nadie que lo observe.</li>
 <li><strong>Adherencia:</strong> se pierde la regularidad que el tratamiento necesita para funcionar.</li>
 <li><strong>Abandono:</strong> la terapia se interrumpe. El hilo se corta.</li></ul>
 <h2>Para llevarte</h2><p>Cada uno de esos cinco puntos es un lugar donde una terapia se puede perder. Nexo existe justamente para que eso no pase, cuidando cada paso.</p>`,
 quiz:[{q:"¿Cuál es el momento más frágil de una terapia?",o:["La aplicación de la dosis","Lo que pasa entre una dosis y la siguiente","La primera consulta","El alta"],c:1,e:"Es entre dosis, cuando nadie observa, donde el tratamiento se cae."},{q:"Que la próxima dosis se corra sin que nadie reaccione es un problema de…",o:["Logística","Retrasos","Adherencia","Abandono"],c:1,e:"Es el riesgo de retrasos."},{q:"Que la medicación o la enfermería no lleguen a tiempo es…",o:["Adherencia","Logística","Seguimiento","Abandono"],c:1,e:"Es un problema de logística."},{q:"Perder la regularidad que el tratamiento necesita es…",o:["Retraso","Logística","Adherencia","Cierre"],c:2,e:"Es un problema de adherencia."},{q:"Cuando la terapia se interrumpe y el hilo se corta, hablamos de…",o:["Abandono","Preparación","Seguimiento","Logística"],c:0,e:"Es el abandono: lo que Nexo busca evitar."}]},

{n:3,t:"El modelo Nexo: cómo funciona",lead:"Un solo modelo que integra a todos, siete fases y un ciclo sin huecos.",
 body:`<h2>La idea</h2><p>Nexo no es una persona ni una alerta: es un <strong>modelo de trabajo ordenado</strong> donde cada paso queda registrado y conectado con el anterior.</p>
 <h2>Un solo modelo que integra a todos</h2><p>Alrededor del paciente hay muchos que cuidan, y Nexo los conecta en un mismo lugar: el <strong>paciente</strong>, la <strong>familia</strong>, la <strong>enfermería</strong>, los <strong>médicos</strong>, la <strong>administración</strong>, los <strong>laboratorios</strong> y los <strong>financiadores</strong>. Ninguno trabaja aislado.</p>
 <h2>El viaje terapéutico: siete fases</h2><p>Cada paciente recorre siempre las mismas siete fases, y cada una queda registrada:</p>
 <ul><li><strong>1. Incorporación</strong> — el paciente entra al programa.</li>
 <li><strong>2. Preparación</strong> — se organiza todo para la terapia.</li>
 <li><strong>3. Administración asistida</strong> — se aplica la dosis con acompañamiento.</li>
 <li><strong>4. Capacitación</strong> — se enseña al paciente y su familia.</li>
 <li><strong>5. Continuidad</strong> — se sostiene el tratamiento en el tiempo.</li>
 <li><strong>6. Incidencias</strong> — se resuelve lo que aparece.</li>
 <li><strong>7. Cierre</strong> — se completa el ciclo.</li></ul>
 <p>Es la columna vertebral del modelo: cada fase queda conectada con la anterior, así nunca se empieza de cero.</p>
 <h2>El ciclo de tres pasos</h2><p>Dentro de cada fase, todo funciona con un ciclo simple y sin huecos: <strong>Observación</strong> (seguimos cada fase de cerca, dentro y fuera de la visita) → <strong>Tarea</strong> (cada observación dispara una acción con un responsable) → <strong>Resolución</strong> (se cierra, se registra y queda trazable, y el ciclo vuelve a empezar).</p>
 <div class="quote">No trabajamos con alertas. Trabajamos con procesos trazables.</div>
 <h2>Para llevarte</h2><p>En Nexo todo queda registrado y trazable. Nada depende de la memoria de una sola persona: depende de un proceso ordenado que todos seguimos.</p>`,
 quiz:[{q:"¿Qué es el modelo Nexo?",o:["Una persona","Una alerta automática","Un modelo de trabajo ordenado que integra a todos","Una app del paciente"],c:2,e:"Integra a todos los que cuidan en un proceso ordenado."},{q:"¿Cuál NO es una de las siete fases?",o:["Incorporación","Administración asistida","Facturación","Cierre"],c:2,e:"Las fases son incorporación, preparación, administración asistida, capacitación, continuidad, incidencias y cierre."},{q:"El ciclo operativo de Nexo es…",o:["Observación → Tarea → Resolución","Diagnóstico → Tratamiento → Alta","Llamado → Espera → Reclamo","Venta → Entrega → Cobro"],c:0,e:"Cada observación genera una tarea con responsable, que se cierra y registra."},{q:"«No trabajamos con alertas, trabajamos con procesos trazables» significa que…",o:["Esperamos que salte una alarma","Seguimos un proceso ordenado y registrado","No registramos nada","Solo actuamos ante emergencias"],c:1,e:"No se espera una alarma: se sigue un proceso ordenado y trazable."},{q:"¿Por qué las siete fases quedan conectadas?",o:["Para cobrar más","Para no empezar de cero en cada paso","Por obligación legal","Para el marketing"],c:1,e:"Cada fase se conecta con la anterior, así se preserva la continuidad."}]},

{n:4,t:"El diferencial y tu rol",lead:"Enfermería propia, una sola cadena de responsabilidad, y el lugar de administración.",
 body:`<h2>La idea</h2><p>Lo que hace distinto a Nexo es que el cuidado no se terceriza ni se corta en pedazos: es <strong>una sola cadena, de punta a punta</strong>.</p>
 <h2>El diferencial</h2><ul><li><strong>Enfermería propia:</strong> la enfermería y el seguimiento son de Humana. No hay intermediarios entre la indicación y el paciente.</li>
 <li><strong>Una sola responsabilidad:</strong> una única cadena de cuidado, de principio a fin, fácil de auditar.</li>
 <li><strong>Respaldo de habilitación:</strong> internación domiciliaria habilitada (Res. 704/2000, Ministerio de Salud).</li></ul>
 <h2>Seguimiento proactivo</h2><p>Nexo no espera a que aparezca un problema. Se anticipa: busca lo que podría cortar el hilo y actúa antes de que suceda.</p>
 <div class="quote">No esperamos incidencias. Buscamos oportunidades para preservar la continuidad.</div>
 <h2>La puerta de entrada digital</h2><p>El primer contacto muchas veces empieza en la web <strong>nexo.humana.com.ar</strong> y en el <strong>Bot Nexo</strong>, que orienta y coordina («Hola, soy Nexo, ¿en qué puedo acompañarte hoy?»). Importante: el Bot orienta y conecta, pero <strong>no reemplaza la consulta clínica</strong>.</p>
 <h2>Tu rol en administración y recepción</h2><p>En el modelo, <strong>administración</strong> es uno de los actores que sostienen el hilo, y sos la <strong>cara humana</strong> detrás de ese primer contacto. En un programa de pacientes, recepción y administración suelen:</p>
 <ul><li>Recibir y orientar al paciente y a su familia con calidez y claridad.</li>
 <li>Coordinar turnos, dosis y logística para que todo llegue a tiempo.</li>
 <li>Registrar cada fase y cada tarea, para que quede trazable.</li>
 <li>Conectar al paciente con su equipo de cuidado cuando hace falta.</li></ul>
 <p>Los procedimientos específicos los vas a ir aprendiendo con el equipo en el día a día.</p>
 <h2>Para llevarte</h2><p>En Nexo, recepción y administración no es «atender el teléfono»: es cuidar que el hilo del tratamiento no se corte. Tu trato y tu orden hacen que el paciente confíe y siga.</p>`,
 quiz:[{q:"¿Por qué la enfermería de Nexo es un diferencial?",o:["Es tercerizada","Es propia de Humana, sin intermediarios","Es voluntaria","La pone el laboratorio"],c:1,e:"La enfermería y el seguimiento son de Humana, una sola cadena."},{q:"«Seguimiento proactivo» significa…",o:["Esperar a que aparezca el problema","Anticiparse y actuar antes de que el hilo se corte","Actuar solo en emergencias","No hacer seguimiento"],c:1,e:"Nexo se anticipa a lo que podría cortar la continuidad."},{q:"El Bot Nexo…",o:["Reemplaza al médico","Orienta y coordina, pero no reemplaza la consulta clínica","Da diagnósticos","Vende medicación"],c:1,e:"Es la puerta digital de orientación; no reemplaza la consulta."},{q:"En Nexo, administración/recepción sobre todo…",o:["Solo archiva papeles","Cuida que el hilo del tratamiento no se corte","Aplica la medicación","Hace diagnósticos"],c:1,e:"Es parte activa de la continuidad, con trato y orden."},{q:"Registrar cada fase y tarea sirve para…",o:["Que quede trazable y nadie empiece de cero","Cobrarle al paciente","Cumplir un trámite sin sentido","Reemplazar a la enfermería"],c:0,e:"La trazabilidad es lo que sostiene la continuidad."}]},

{n:5,t:"El valor y el impacto",lead:"Qué recibe quien confía en Nexo, la tecnología y la visión a futuro.",
 body:`<h2>La idea</h2><p>Todo el trabajo de Nexo se traduce en algo concreto: <strong>visibilidad de la continuidad</strong>. Es decir, poder mostrar —con datos— que las terapias efectivamente se sostienen.</p>
 <h2>Qué recibe el laboratorio</h2><p>El laboratorio (que provee o financia la terapia) recibe indicadores de cómo evoluciona la continuidad, <strong>siempre agregados y anonimizados</strong> —nunca datos personales de un paciente—:</p>
 <ul><li><strong>Adherencia:</strong> si el paciente sigue el tratamiento como corresponde.</li>
 <li><strong>Persistencia:</strong> si lo sostiene en el tiempo.</li>
 <li><strong>Experiencia:</strong> cómo vive el paciente el acompañamiento.</li>
 <li><strong>Farmacovigilancia:</strong> el seguimiento de la seguridad del tratamiento.</li></ul>
 <div class="quote">Los datos son siempre agregados y anonimizados: se cuida la privacidad del paciente.</div>
 <h2>La tecnología: hoy y mañana</h2><p><strong>Hoy</strong>, Nexo funciona sobre la plataforma actual de Humana: registro de fases y tareas, trazabilidad del proceso y coordinación del equipo de cuidado. <strong>Mañana</strong>, con Humana Core: una app para el paciente y su familia, indicadores en tiempo real y capacidad multi-terapia. Empezamos sobre lo que ya funciona.</p>
 <h2>La visión</h2><p>Las terapias pueden cambiar —inmunoglobulinas, biológicos, nutrición, oncología, enfermedades raras y más—, pero la <strong>necesidad de continuidad permanece</strong>. Ese es el norte de Nexo.</p>
 <div class="quote">Que ninguna terapia se pierda entre una dosis y la siguiente.</div>
 <h2>Para llevarte</h2><p>El impacto de Nexo se mide en continuidad. Y esa continuidad la construyen todos los que cuidan —incluido tu trabajo desde administración y recepción.</p>`,
 quiz:[{q:"El valor que Nexo le da al laboratorio es…",o:["Datos personales de cada paciente","Visibilidad de la continuidad, con datos agregados y anonimizados","Publicidad","Descuentos"],c:1,e:"Indicadores agregados y anonimizados; nunca datos personales."},{q:"¿Cuál de estos es un indicador de Nexo?",o:["Facturación","Adherencia","Rating publicitario","Stock"],c:1,e:"Adherencia, persistencia, experiencia y farmacovigilancia."},{q:"Que los datos sean «agregados y anonimizados» significa que…",o:["Se comparten datos personales","Se cuida la privacidad del paciente","No se registran","Son públicos"],c:1,e:"Se protege la privacidad: nunca datos personales identificables."},{q:"«Humana Core» es…",o:["La plataforma de hoy","La evolución futura: app para paciente y familia, indicadores en tiempo real","Un laboratorio","Una obra social"],c:1,e:"Es el mañana: app, tiempo real y multi-terapia."},{q:"La visión de Nexo es que…",o:["La terapia nunca cambie","Aunque cambien las terapias, la continuidad permanezca","Se atienda solo una enfermedad","Se reduzcan los costos y nada más"],c:1,e:"Que ninguna terapia se pierda entre una dosis y la siguiente."}]}
];

function renderLesson(m){
 const prev=LES.find(x=>x.n===m.n-1), next=LES.find(x=>x.n===m.n+1);
 const pager=`<div class="pager"><a class="${prev?'':'disabled'}" onclick="${prev?`openL(${prev.n})`:''}">← ${prev?('Lección '+prev.n):''}</a><a onclick="${next?`openL(${next.n})`:'home()'}">${next?('Lección '+next.n):'Volver al inicio'} →</a></div>`;
 app.innerHTML=`<section class="mhero"><div class="wrap"><a class="back" onclick="home()">← Volver a las lecciones</a>

function renderQuiz(m){answers={};curQuiz=m;document.getElementById('quiz').innerHTML=m.quiz.map((q,qi)=>`<div class="q"><div class="qt">${qi+1}. ${q.q}</div>${q.o.map((o,oi)=>`<label class="opt" id="o_${qi}_${oi}" onclick="pick(${qi},${oi})">${o}</label>`).join('')}<div class="exp" id="e_${qi}">✔ ${q.e}</div></div>`).join('');}
function pick(qi,oi){answers[qi]=oi;[0,1,2,3].forEach(i=>{const e=document.getElementById('o_'+qi+'_'+i);if(e)e.classList.remove('sel');});document.getElementById('o_'+qi+'_'+oi).classList.add('sel');}
function grade(n){const m=curQuiz;let ok=0;m.quiz.forEach((q,qi)=>{q.o.forEach((_,oi)=>{const el=document.getElementById('o_'+qi+'_'+oi);el.classList.remove('sel');el.style.pointerEvents='none';if(oi===q.c)el.classList.add('correct');else if(answers[qi]===oi)el.classList.add('wrong');});if(answers[qi]===q.c)ok++;document.getElementById('e_'+qi).classList.add('show');});
 const pct=Math.round(ok/m.quiz.length*100);const prev=scores[n];if(scores[n]==null||pct>scores[n]){scores[n]=pct;STORE.set('hn_s',scores);saveProgress();}
 if(pct>=60&&(prev==null||prev<60)){const c=IDS.filter(done).length;toast(c>=5?'¡Completaste Humana Nexo! 🎓':'Lección completada ✓');}
 renderUserbox();
 const s=document.getElementById('score');s.classList.add('show');
 const msg=pct>=60?(pct===100?'Excelente, dominás el tema.':'Aprobada. Lección completada.'):'Aún no alcanzás el 60%. Repasá y volvé a intentar.';
 s.innerHTML=`Respondiste <b>${ok} de ${m.quiz.length}</b> correctas (${pct}%). ${msg}`;setTimeout(function(){showLessonResult(n,pct);},260);}

  function _coachTargets(){ var a=[]; var ub=document.getElementById("userbox"); if(ub)a.push({el:ub,t:"Acá ves tu avance en todo momento."}); var cd=document.querySelector(".lcard"); if(cd)a.push({el:cd,t:"Tocá acá para empezar a aprender."}); var ce=document.querySelector("nav.desk a[onclick*='openCert']"); if(ce)a.push({el:ce,t:"Tu certificado aparece acá al terminar."}); return a.filter(function(x){return x.el&&x.el.getBoundingClientRect().width>0;}); }
  function _startCoach(){ _obcssInject(); var tg=_coachTargets(); if(!tg.length){ _finishOb(); return; } var i=0; var ov=document.getElementById("coach"); if(!ov){ov=document.createElement("div");ov.id="coach";ov.className="coach";document.body.appendChild(ov);}
    function show(){ var el=tg[i].el; el.scrollIntoView({block:"center"}); setTimeout(function(){ var r=el.getBoundingClientRect(); var p=8; var below=r.bottom<window.innerHeight-150; var ty=below?(r.bottom+12):(r.top-12); var tx=Math.max(12,Math.min(window.innerWidth-274,r.left));
      ov.innerHTML="<div class=\"coach-block\"></div><div class=\"coach-ring\" style=\"left:"+(r.left-p)+"px;top:"+(r.top-p)+"px;width:"+(r.width+p*2)+"px;height:"+(r.height+p*2)+"px\"></div><div class=\"coach-tip\" style=\"left:"+tx+"px;top:"+ty+"px;"+(below?"":"transform:translateY(-100%)")+"\"><p>"+tg[i].t+"</p><div class=\"coach-nav\"><span>"+(i+1)+"/"+tg.length+"</span><button onclick=\"__coachNext()\">"+(i<tg.length-1?"Siguiente":"Listo")+"</button></div></div>";
      ov.classList.add("on"); },320); }
    window.__coachNext=function(){ i++; if(i>=tg.length){ ov.classList.remove("on"); _finishOb(); } else show(); }; show(); }
  function _finishOb(){ try{STORE.set("hn_onboarded",true);}catch(e){} }
  function startNexoOnboarding(){ _ts=0; _renderTour(); }

function showLessonResult(n,pct){var pop=document.getElementById('mpop');if(!pop)return;var passed=pct>=60;var compl=IDS.filter(done).length,pp=Math.round(compl/5*100);var title,sub,primL,primA,sec;
 if(passed){var next=LES.find(function(x){return x.n===n+1;});title='¡Felicitaciones!';sub='Completaste la Lección '+n+' con '+pct+'%.';if(allDone()){primL='Ver mi certificado 🎓';primA='openCert()';}else if(next){primL='Continuar: Lección '+next.n+' →';primA='openL('+next.n+')';}else{primL='Volver al inicio';primA='home()';}sec=true;}
 else{title='¡Casi!';sub='Sacaste '+pct+'%. Necesitás 60% para aprobar. Repasá y reintentá.';primL='Reintentar';primA='openL('+n+')';sec=true;}
 pop.innerHTML='<div class="box"><div style="font-size:44px;line-height:1;margin-bottom:4px">'+(passed?'🎉':'💪')+'</div><h3>'+title+'</h3><p class="ps">'+sub+'</p>'+(passed?'<div class="pr">Tu avance: '+compl+'/5</div><div class="pbar"><i style="width:'+pp+'%"></i></div>':'')+'<button class="pbtn" onclick="closePop();'+primA+'">'+primL+'</button>'+(sec?'<button class="pbtn ghost" onclick="closePop()">Seguir acá</button>':'')+'</div>';pop.classList.add('on');}
